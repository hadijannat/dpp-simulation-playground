version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
    groups:
      react-runtime:
        patterns:
          - "react"
          - "react-dom"
      typescript-eslint:
        patterns:
          - "@typescript-eslint/eslint-plugin"
          - "@typescript-eslint/parser"
    ignore:
      - dependency-name: "typescript"
        update-types:
          - "version-update:semver-major"

  - package-ecosystem: "pip"
    directory: "/services/simulation-engine"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "fastapi"
      - dependency-name: "sqlalchemy"
      - dependency-name: "requests"
      - dependency-name: "uvicorn"
      - dependency-name: "opentelemetry-*"

  - package-ecosystem: "pip"
    directory: "/services/compliance-service"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "fastapi"
      - dependency-name: "sqlalchemy"
      - dependency-name: "requests"
      - dependency-name: "uvicorn"
      - dependency-name: "opentelemetry-*"

  - package-ecosystem: "pip"
    directory: "/services/gamification-service"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "fastapi"
