      - dependency-name: "requests"
      - dependency-name: "uvicorn"
      - dependency-name: "opentelemetry-*"

  - package-ecosystem: "pip"
    directory: "/services/platform-core"
    schedule:
      interval: "weekly"
    ignore:
      - dependency-name: "fastapi"
